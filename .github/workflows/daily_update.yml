name: Daily News Update

on:
  # schedule:
  #   # 한국 시간 아침 7시 (UTC 22:00) 실행
  #   - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행으로 변경 (자동 스케줄 중단)

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Run Update Script
      run: |
        node update_news.js

    - name: Commit and Push changes
      run: |
        git config --global user.name 'NewsBot'
        git config --global user.email 'bot@noreply.github.com'
        git add data.js
        git diff --quiet && git diff --staged --quiet || (git commit -m "📰 Daily News Update: $(date +'%Y-%m-%d')" && git push)
